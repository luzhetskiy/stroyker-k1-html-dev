<div class="product-item">
  <a href="/catalog/product/tovar-1/" class="product-item__link">
    <div class="product-item__image">
      <div class="product-item__image-inner">
        <img src="@images/banner-content-1.png" alt="Товар 1" />
      </div>

      <span class="product-item__flag-content">
        <span class="product-item__flag product-item__flag--hit">Хит</span>
        <span class="product-item__flag product-item__flag--sale">sale</span>
        <span class="product-item__flag product-item__flag--new">new</span>
      </span>
      <%~
      include("/components/product-teasers/templates/product-card-sell-badge/product-card-sell-badge_bottom.html")
      %>
      <span class="product-item__img-text">Заказ 30 дней!</span>
    </div>
    <span class="product-item__content-top">
      <span class="product-item__head">
        <span class="product-item__art">20464111</span>
        <span class="product-item__rating">
          <span class="star star--full"></span>
          <span class="star star--full"></span>
          <span class="star star--full"></span>
          <span class="star star--half"></span>
          <span class="star star--empty"></span>
        </span>
      </span>

      <span class="product-item__name"
        >Фанера влагостойкая 12x2500х1250 мм (европейский стандарт)</span
      >

      <div class="product-item__status product-item__status--small">Мало</div>

      <span class="product-item__cost">
        <span class="product-item__cost-product"
          >89 537,50<span> ₽/шт</span></span
        >
        <span class="product-item__cost-old"> 99 999,99 ₽</span>
      </span>

      <span class="product-item__balance">0</span>

      <span class="product-item__line-cost">1&nbsp;000,00</span>
      <span class="product-item__line-cost"></span>
    </span>
  </a>
  <div class="product-item__content-bottom">
    <div class="product-item__btns">
      <div class="shopping-cart-product">
        <div class="input-number">
          <div class="order-down"></div>
          <input
            type="number"
            min="0"
            step="1"
            value="1"
            id="number"
            required=""
          />
          <div class="order-up"></div>
        </div>
        <a href="" class="shopping-cart-btn">
          <svg class="icon">
            <use xlink:href="#shopping-cart"></use>
          </svg>
        </a>
        <button
          type="button"
          class="st-button st-button_secondary st-button_compare"
        >
          <span class="svg-icon">
            <svg
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="currentColor"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M20.5 12H17.5V21H20.5V12Z" />
              <path d="M6.5 7.5H3.5V21H6.5V7.5Z" />
              <path d="M13.5 3H10.5V21H13.5V3Z" />
            </svg>
          </span>
        </button>
      </div>
    </div>
  </div>
</div>
